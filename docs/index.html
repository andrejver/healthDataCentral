<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #07090f;
      --s1:     #0d1117;
      --s2:     #161b27;
      --border: #1e2533;
      --text:   #e6edf3;
      --muted:  #7d8590;
      --accent: #4f8ef7;
      --green:  #3fb950;
      --red:    #f85149;
      --purple: #a371f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(7, 9, 15, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
    }

    .h-title { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; }
    .h-sub   { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

    .range-pills {
      display: flex; gap: 2px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 8px; padding: 3px; flex-shrink: 0;
    }
    .range-pills button {
      background: none; border: none; color: var(--muted);
      border-radius: 5px; padding: 5px 13px;
      font: 500 0.78rem/1 'Inter', sans-serif;
      cursor: pointer; transition: background 0.12s, color 0.12s;
    }
    .range-pills button.active { background: var(--s2); color: var(--text); }
    .range-pills button:hover:not(.active) { color: var(--text); }

    /* ── Layout ─────────────────────────────────────── */
    main {
      max-width: 1120px; margin: 0 auto;
      padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.85rem;
    }

    /* ── Cards ──────────────────────────────────────── */
    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      position: relative; overflow: hidden;
    }

    .card-label {
      font-size: 0.67rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 0.45rem;
    }

    /* ── Hero row ───────────────────────────────────── */
    .hero-row {
      display: grid;
      grid-template-columns: 185px 1fr;
      gap: 0.85rem; align-items: start;
    }

    .weight-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .weight-val  {
      font-size: 2.9rem; font-weight: 800;
      letter-spacing: -0.04em; line-height: 1; color: var(--text);
    }
    .weight-unit { font-size: 1.1rem; font-weight: 500; color: var(--muted); margin-left: 3px; }

    /* ── Stat grid ──────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.85rem;
    }

    .stat-val {
      font-size: 1.45rem; font-weight: 700;
      letter-spacing: -0.025em; line-height: 1.1;
    }
    .stat-sub {
      font-size: 0.68rem; color: var(--muted);
      margin-top: 0.3rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .up   { color: var(--red); }
    .down { color: var(--green); }
    .flat { color: var(--muted); }

    /* ── Chart row ──────────────────────────────────── */
    .chart-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 0.85rem;
    }

    .chart-card h3 {
      font-size: 0.67rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 0.85rem;
    }

    /* ── No data ────────────────────────────────────── */
    #no-data {
      display: none; text-align: center;
      color: var(--muted); padding: 5rem 0; font-size: 0.9rem;
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 780px) {
      header { padding: 0.75rem 1rem; }
      main   { padding: 1rem; gap: 0.75rem; }

      .hero-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-row  { grid-template-columns: 1fr; }

      .weight-val { font-size: 2.4rem; }
    }

    @media (max-width: 400px) {
      .range-pills button { padding: 5px 8px; font-size: 0.73rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="h-title">Health Dashboard</div>
    <div class="h-sub" id="last-updated">Loading…</div>
  </div>
  <div class="range-pills">
    <button data-range="30">30d</button>
    <button data-range="90" class="active">90d</button>
    <button data-range="365">1y</button>
    <button data-range="0">All</button>
  </div>
</header>

<main>
  <p id="no-data">No data yet — trigger the routine to populate data.json.</p>

  <div id="dashboard">
    <div class="hero-row">
      <!-- Current weight -->
      <div class="card weight-card">
        <div class="card-label">Current weight</div>
        <div id="hero-weight"><span class="weight-val">—</span></div>
      </div>

      <!-- Stat cards -->
      <div class="stats-grid">
        <div class="card">
          <div class="card-label">Change</div>
          <div class="stat-val flat" id="stat-delta">—</div>
          <div class="stat-sub"     id="stat-delta-sub"></div>
        </div>
        <div class="card">
          <div class="card-label">Minimum</div>
          <div class="stat-val" id="stat-min">—</div>
        </div>
        <div class="card">
          <div class="card-label">Maximum</div>
          <div class="stat-val" id="stat-max">—</div>
        </div>
        <div class="card">
          <div class="card-label">Average</div>
          <div class="stat-val" id="stat-avg">—</div>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-row">
      <div class="card chart-card">
        <h3>Weight (kg)</h3>
        <canvas id="chart-weight"></canvas>
      </div>
      <div class="card chart-card">
        <h3>Body Fat (%)</h3>
        <canvas id="chart-fat"></canvas>
      </div>
      <div class="card chart-card">
        <h3>Muscle Mass (kg)</h3>
        <canvas id="chart-muscle"></canvas>
      </div>
    </div>
  </div>
</main>

<script>
const $  = id => document.getElementById(id);
const fmt = (v, d = 1) => v == null ? '—' : Number(v).toFixed(d);

function movingAvg(arr, w = 7) {
  return arr.map((_, i) => {
    const s = arr.slice(Math.max(0, i - w + 1), i + 1).filter(v => v != null);
    return s.length ? s.reduce((a, b) => a + b, 0) / s.length : null;
  });
}

// ── Chart defaults ───────────────────────────────────
const CHART_BASE = {
  responsive: true,
  maintainAspectRatio: true,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: false },
    tooltip: {
      displayColors: false,
      backgroundColor: '#161b27',
      borderColor: '#1e2533', borderWidth: 1,
      titleColor: '#7d8590', bodyColor: '#e6edf3',
      padding: 10,
      titleFont: { size: 11, family: 'Inter' },
      bodyFont:  { size: 12, family: 'Inter' },
    },
  },
  scales: {
    x: {
      ticks: { color: '#7d8590', maxTicksLimit: 6, maxRotation: 0, font: { size: 10 } },
      grid:  { color: '#1e2533' },
      border: { display: false },
    },
    y: {
      ticks: { color: '#7d8590', font: { size: 10 } },
      grid:  { color: '#1e2533' },
      border: { display: false },
    },
  },
};

// ── State ────────────────────────────────────────────
let allData = [], charts = {}, activeRange = 90;

function filterData(range) {
  if (!range) return allData;
  const cut = new Date();
  cut.setDate(cut.getDate() - range);
  const cutStr = cut.toISOString().slice(0, 10);
  return allData.filter(r => r.date >= cutStr);
}

// ── Stats (all from filtered data) ───────────────────
function renderStats(data) {
  // Current weight — always latest overall reading
  const cur = [...allData].reverse().find(r => r.weight != null)?.weight;
  $('hero-weight').innerHTML = cur != null
    ? `<span class="weight-val">${fmt(cur)}</span><span class="weight-unit">kg</span>`
    : `<span class="weight-val">—</span>`;

  // All other stats from the selected range
  const ws      = data.filter(r => r.weight != null);
  const weights = ws.map(r => r.weight);
  const first   = ws[0]?.weight;
  const last    = ws.at(-1)?.weight;
  const delta   = first != null && last != null ? last - first : null;

  const deltaEl = $('stat-delta');
  if (delta != null) {
    const sign = delta > 0 ? '+' : '';
    deltaEl.textContent = `${sign}${fmt(delta)} kg`;
    deltaEl.className   = `stat-val ${delta > 0.05 ? 'up' : delta < -0.05 ? 'down' : 'flat'}`;
  } else {
    deltaEl.textContent = '—';
    deltaEl.className   = 'stat-val flat';
  }
  $('stat-delta-sub').textContent = ws.length >= 2
    ? `${ws[0].date.slice(5)} → ${ws.at(-1).date.slice(5)}` : '';

  $('stat-min').textContent = weights.length ? `${fmt(Math.min(...weights))} kg` : '—';
  $('stat-max').textContent = weights.length ? `${fmt(Math.max(...weights))} kg` : '—';
  $('stat-avg').textContent = weights.length
    ? `${fmt(weights.reduce((a, b) => a + b, 0) / weights.length)} kg` : '—';
}

// ── Charts ───────────────────────────────────────────
function ds(color, bg, data) {
  return {
    data, borderColor: color, backgroundColor: bg,
    borderWidth: 2, pointRadius: 0, tension: 0.3,
    fill: true, spanGaps: true,
  };
}

function renderCharts(data) {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const labels  = data.map(r => r.date);
  const weights = data.map(r => r.weight   ?? null);
  const fat     = data.map(r => r.fat_pct  ?? null);
  const muscle  = data.map(r => r.muscle_kg ?? null);

  charts.weight = new Chart($('chart-weight'), {
    type: 'line',
    data: { labels, datasets: [
      ds('#4f8ef7', 'rgba(79,142,247,0.1)', weights),
      {
        data: movingAvg(weights, 7),
        label: '7d avg',
        borderColor: '#a371f7', backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [4, 3],
        pointRadius: 0, tension: 0.3, fill: false, spanGaps: true,
      },
    ]},
    options: { ...CHART_BASE, aspectRatio: 2.6 },
  });

  charts.fat = new Chart($('chart-fat'), {
    type: 'line',
    data: { labels, datasets: [ ds('#f85149', 'rgba(248,81,73,0.1)', fat) ] },
    options: { ...CHART_BASE, aspectRatio: 1.8 },
  });

  charts.muscle = new Chart($('chart-muscle'), {
    type: 'line',
    data: { labels, datasets: [ ds('#3fb950', 'rgba(63,185,80,0.1)', muscle) ] },
    options: { ...CHART_BASE, aspectRatio: 1.8 },
  });
}

// ── Range selection ───────────────────────────────────
function applyRange(range) {
  activeRange = range;
  document.querySelectorAll('.range-pills button').forEach(b =>
    b.classList.toggle('active', Number(b.dataset.range) === range));
  const data = filterData(range);
  renderStats(data);
  renderCharts(data);
}

// ── Boot ─────────────────────────────────────────────
// ?t= query string busts the browser cache on every load
fetch('data.json?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    if (!Array.isArray(data) || !data.length) {
      $('no-data').style.display = 'block';
      $('dashboard').style.display = 'none';
      return;
    }
    allData = data;
    const d = allData.at(-1)?.date;
    if (d) $('last-updated').textContent = `Updated ${d}`;
    document.querySelectorAll('.range-pills button').forEach(b =>
      b.addEventListener('click', () => applyRange(Number(b.dataset.range))));
    applyRange(activeRange);
  })
  .catch(() => {
    $('no-data').style.display = 'block';
    $('dashboard').style.display = 'none';
  });
</script>
</body>
</html>
